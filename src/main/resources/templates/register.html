<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro - UniPlan</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .register-container { background-color: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: .5rem; color: #666; }
        input, select { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: .75rem; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #218838; }
        .login-link { text-align: center; margin-top: 1rem; }
        .login-link a { color: #0056b3; text-decoration: none; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; text-align: center; }
        .alert-error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Registro de Usuarios</h2>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label for="userType">Registrarse como</label>
            <select id="userType" name="userType" required>
                <option value="STUDENT">Estudiante</option>
                <option value="EMPLOYEE">Empleado</option>
            </select>
        </div>
        <div class="form-group">
            <label for="institutionalCode">Código Institucional (ID)</label>
            <input type="text" id="institutionalCode" name="institutionalCode" placeholder="ej. 2021001" required>
        </div>
        <div class="form-group">
            <label for="email">Correo Institucional</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@icesi.edu.co" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" minlength="6" required>
        </div>
        <button type="submit">Registrarse</button>
    </form>
    
    <div class="login-link">
        <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
    </div>
</div>

</body>
</html>
