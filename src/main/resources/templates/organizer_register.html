<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Organizer Registration - UniPlan</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 450px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-weight: bold; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #004494; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .alert-error { background-color: #f8d7da; color: #721c24; }
        .alert-success { background-color: #d4edda; color: #155724; }
        .type-specific { display: none; }
    </style>
    <script>
        function showFields() {
            var type = document.getElementById("organizerType").value;
            document.querySelectorAll(".type-specific").forEach(el => el.style.display = "none");
            if (type === "PROFESSOR") {
                document.getElementById("professorFields").style.display = "block";
            } else if (type === "LEADER") {
                document.getElementById("leaderFields").style.display = "block";
            } else if (type === "WELLBEING") {
                document.getElementById("wellbeingFields").style.display = "block";
            }
        }
    </script>
</head>
<body>

<div class="container">
    <h2>Register Organizer</h2>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{/register-organizer}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-group">
            <label for="institutionalCode">Institutional Code *</label>
            <input type="text" id="institutionalCode" name="institutionalCode" placeholder="e.g. 2024001" required>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" placeholder="institutional@icesi.edu.co" required>
        </div>

        <div class="form-group">
            <label for="password">Password (min 8 chars)</label>
            <input type="password" id="password" name="password" minlength="8" required>
        </div>

        <div class="form-group">
            <label for="organizerType">Organizer Type *</label>
            <select id="organizerType" name="organizerType" onchange="showFields()" required>
                <option value="">Select type</option>
                <option value="PROFESSOR">Professor</option>
                <option value="LEADER">Leader</option>
                <option value="WELLBEING">Wellbeing</option>
            </select>
        </div>

        <!-- Professor Fields -->
        <div id="professorFields" class="type-specific">
            <div class="form-group">
                <label for="facultyCode">Faculty Code</label>
                <input type="number" name="facultyCode">
            </div>
            <div class="form-group">
                <label for="departmentCode">Department Code</label>
                <input type="number" name="departmentCode">
            </div>
            <div class="form-group">
                <label for="areaCode">Area Code</label>
                <input type="text" name="areaCode">
            </div>
        </div>

        <!-- Leader Fields -->
        <div id="leaderFields" class="type-specific">
            <div class="form-group">
                <label for="academicProgramCode">Academic Program Code</label>
                <input type="number" name="academicProgramCode">
            </div>
            <div class="form-group">
                <label for="semester">Semester</label>
                <input type="number" name="semester">
            </div>
            <div class="form-group">
                <label for="groupRepresented">Group or Association</label>
                <input type="text" name="groupRepresented">
            </div>
        </div>

        <!-- Wellbeing Fields -->
        <div id="wellbeingFields" class="type-specific">
            <div class="form-group">
                <label for="administrativeArea">Administrative Area</label>
                <input type="text" name="administrativeArea">
            </div>
            <div class="form-group">
                <label for="position">Position</label>
                <input type="text" name="position">
            </div>
        </div>

        <button type="submit">Register Organizer</button>
    </form>
    <div style="text-align: center; margin-top: 1rem;">
        <a href="/admin/dashboard" style="color: #666; font-size: 0.9rem;">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
