spring.application.name=EventManager

# Permitir que Spring maneje múltiples definiciones de beans (necesario por la duplicidad de config de Mongo)
spring.main.allow-bean-definition-overriding=true

# =========================================
# MONGODB
# =========================================
spring.data.mongodb.uri=mongodb+srv://giuseppe_db_user:123@cluster0.lfnesef.mongodb.net/UniPlan?retryWrites=true&w=majority&appName=Cluster0
spring.data.mongodb.database=UniPlan

# =========================================
# POSTGRESQL - NEON
# =========================================
# ATENCION: El error UnknownHostException indica que este host no es resoluble.
# Verifica en tu consola de Neon (https://console.neon.tech) la URL exacta.
# Si estas en una red con restricciones, intenta usar el host sin 'pooler'.
spring.datasource.url=jdbc:postgresql://ep-small-morning-apm9h3z9.us-east-1.aws.neon.tech/neondb?sslmode=require

spring.datasource.username=neondb_owner
spring.datasource.password=npg_so8QyeYn4Pmp
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# HIKARI CONNECTION POOL
# =========================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Definir el dialecto manualmente para evitar el error de inicio cuando no hay conexion
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================================
# SQL INIT
# =========================================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# =========================================
# SERVER
# =========================================
server.port=8081

# =========================================
# LOGS
# =========================================
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.mongodb.driver=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE